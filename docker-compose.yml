services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pfm
      POSTGRES_PASSWORD: pfm
      POSTGRES_DB: pfm_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql

volumes:
  postgres_data:
